name: kibble
description: Run a repository's documented install steps in a clean container so a broken install fails the build.
branding:
  icon: check-circle
  color: yellow
inputs:
  repo:
    description: Path to the repository to check.
    required: false
    default: "."
  version:
    description: Version of kibble to install (a git tag, or latest).
    required: false
    default: latest
  args:
    description: Extra flags passed to kibble, for example -strict.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.26"
    - name: Install kibble
      shell: bash
      run: go install github.com/dcadolph/kibble@${{ inputs.version }}
    - name: Run kibble
      shell: bash
      run: $(go env GOPATH)/bin/kibble ${{ inputs.args }} "${{ inputs.repo }}"
